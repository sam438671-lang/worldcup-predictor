function poissonLambda(team,opp){
  let t=TEAMS[team]||{a:70,d:70,m:70,e:1800,f:0},o=TEAMS[opp]||{a:70,d:70,m:70,e:1800,f:0};
  let atk=t.a/100,def=Math.max(o.d/100,0.55),elo=(t.e-o.e)/400;
  let form=(t.f||0)*0.08,oppForm=(o.f||0)*0.05;
  let star=(t.f||0)*0.10,oppStar=(o.f||0)*0.05;
  let base=1.51;
  return Math.max(0.20,Math.min(4.2,base*(atk/def)+elo*0.60+form-oppForm+star-oppStar));
}
function simGoals(lam){let L=Math.exp(-lam),k=0,p=1;while(p>L){k++;p*=Math.random()}return k-1;}

function simulate(a,b,n){
  let aw=0,dw=0,bw=0,scores=[],htScores=[];

  for(let i=0;i<n;i++){
    let la=poissonLambda(a,b),lb=poissonLambda(b,a);
    if(Math.random()<0.06){la*=0.7;reds++}
    if(Math.random()<0.06){lb*=0.7;reds++}
    let pa=Math.random()<0.10?1:0,pb=Math.random()<0.10?1:0;
    if(pa+pb>0)pens++;
    let ga=simGoals(la)+pa,gb=simGoals(lb)+pb;
    scores.push([ga,gb]);
    if(ga>gb)aw++;else if(ga===gb)dw++;else bw++;
    let ha=simGoals(la*0.45),hb=simGoals(lb*0.40);
    htScores.push([ha,hb]);
  }
  let total=n;

  // Over/Under
  let over25=scores.filter(s=>s[0]+s[1]>2.5).length/total*100;
  let over15=scores.filter(s=>s[0]+s[1]>1.5).length/total*100;
  let over35=scores.filter(s=>s[0]+s[1]>3.5).length/total*100;
  // BTTS
  let btts=scores.filter(s=>s[0]>0&&s[1]>0).length/total*100;
  // HT/FT
  let htft={};htScores.forEach((h,i)=>{let f=scores[i];let hk=(h[0]>h[1]?'H':h[0]===h[1]?'D':'A')+'/'+(f[0]>f[1]?'H':f[0]===f[1]?'D':'A');htft[hk]=(htft[hk]||0)+1});

    let cover=scores.filter(s=>s[0]-s[1]>h).length/total*100;

  let recs=[];

  if(over25>60)recs.push(`【高信心】大 2.5 球 (${over25.toFixed(0)}%)`);
  if(100-over25>60)recs.push(`【高信心】小 2.5 球 (${(100-over25).toFixed(0)}%)`);
  if(btts>60)recs.push(`【高信心】兩隊都進球-是 (${btts.toFixed(0)}%)`);

  return {
    a,b,n,sa:((TEAMS[a]||{}).a*0.35+(TEAMS[a]||{}).d*0.30+(TEAMS[a]||{}).m*0.35).toFixed(1),
    sb:((TEAMS[b]||{}).a*0.35+(TEAMS[b]||{}).d*0.30+(TEAMS[b]||{}).m*0.35).toFixed(1),
    fa:(TEAMS[a]||{}).f||0,fb:(TEAMS[b]||{}).f||0,
    wp:{a:(aw/total*100).toFixed(1),draw:(dw/total*100).toFixed(1),b:(bw/total*100).toFixed(1)},
    ou:{over15:over15.toFixed(1),over25:over25.toFixed(1),over35:over35.toFixed(1),under25:(100-over25).toFixed(1)},
    btts:{yes:btts.toFixed(1),no:(100-btts).toFixed(1)},
    topScores,topHtFt,handicaps,avgGoals,recs,
    reds:(reds/total).toFixed(2),pens:(pens/total).toFixed(2)
  };
}

function runSim(){
  if(!selectedMatch)return alert('請先選擇對戰組合');
  let sims=parseInt(document.querySelector('input[name="sims"]:checked').value);
  let bet=document.getElementById('betType').value;
  let [a,b]=selectedMatch;
  document.getElementById('result').innerHTML='<div style="text-align:center;padding:60px"><div style="font-size:36px">⏳</div><p>模擬分析中...</p></div>';
  setTimeout(()=>{
    let r=simulate(a,b,sims);
    showResult(r,bet);
  },50);
}

function showResult(r,bt){
  let html=`<h2 style="margin-bottom:4px">${r.a} vs ${r.b} <span style="font-size:12px;color:#94A3B8">(${r.n}次模擬)</span></h2>
  <p style="font-size:11px;color:#94A3B8;margin-bottom:12px">戰力 ${r.a}:${r.sa}(狀態${r.fa>0?'+':''}${r.fa}) | ${r.b}:${r.sb}(狀態${r.fb>0?'+':''}${r.fb}) | 紅牌率:${r.reds}/場 點球率:${r.pens}/場</p>
  <div class="section"><h4>📊 勝率預測</h4>`;
  [{l:r.a,p:r.wp.a,c:'#10B981'},{l:'平局',p:r.wp.draw,c:'#F59E0B'},{l:r.b,p:r.wp.b,c:'#EF4444'}].forEach(x=>{
    html+=`<div class="bar-row"><span>${x.l}</span><div class="bar"><div style="width:${x.p}%;background:${x.c}"></div></div><span class="pct" style="color:${x.c}">${x.p}%</span></div>`;
  });
  html+=`</div>`;

  if(bt.includes('綜合')||bt.includes('勝負'))
    html+=`<div class="section"><h4>⚽ 全場勝負</h4><p>${r.a} 勝: ${r.wp.a}%  平局: ${r.wp.draw}%  ${r.b} 勝: ${r.wp.b}%</p></div>`;
  if(bt.includes('綜合')||bt.includes('讓分'))
    html+=`<div class="section"><h4>📐 讓分盤</h4><p>${Object.entries(r.handicaps).map(([k,v])=>`${r.a} ${k}: 過盤率 ${v}%`).join('\n')}</p></div>`;
  if(bt.includes('綜合')||bt.includes('大小'))
    html+=`<div class="section"><h4>📏 大小球</h4><p>大1.5: ${r.ou.over15}% | 大2.5: ${r.ou.over25}% | 小2.5: ${r.ou.under25}% | 大3.5: ${r.ou.over35}%\n平均總進球: ${r.avgGoals} 球</p></div>`;
  if(bt.includes('綜合')||bt.includes('正確比數'))
    html+=`<div class="section"><h4>🎯 正確比數 TOP3</h4><p>${r.topScores.map(s=>`${s[0]} (${s[1]}%)`).join(' | ')}</p></div>`;
  if(bt.includes('綜合')||bt.includes('BTTS'))
    html+=`<div class="section"><h4>⚡ BTTS</h4><p>是: ${r.btts.yes}% | 否: ${r.btts.no}%</p></div>`;
  if(bt.includes('綜合')||bt.includes('半場'))
    html+=`<div class="section"><h4>⏱️ 半全場 TOP5</h4><p>${r.topHtFt.map(s=>`${s[0]}: ${s[1]}%`).join(' | ')}</p></div>`;
  if(r.recs.length)
    html+=`<div class="section rec"><h4>💡 運彩推薦</h4><p>${r.recs.join('\n')}</p></div>`;

  document.getElementById('result').innerHTML=html;
}
</script>
